<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Formation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { 
            background-color: #f0f2f5; 
            margin: 0;
            overflow-x: hidden; /* Prevents side-scrolling */
        }

        /* 1. NAVBARS */
        .formation-bar {
            background-color: #1b5e20;
            padding: 20px; 
            font-size: 1.3rem; 
            
            /* The Magic Sauce */
            display: flex;            /* Turns the bar into a flex container */
            justify-content: space-evenly; /* Spaces links evenly across the width */
            align-items: center;      /* Centers them vertically */
        }

        .formation-link.active-link {
            padding-bottom: 5px;
            color: #a5d6a7 !important; /* Lighter green to stand out */
            font-weight: bold;
        }

        .formation-link {
            color: white;
            margin: 0;               /* Remove the old manual margins */
            font-weight: bold;
            text-decoration: none;
            flex: 1;                 /* Optional: gives each link equal "hit area" */
            text-align: center;      /* Centers text within that hit area */
        }

        .formation-link:hover { 
            color: #a5d6a7; 
            border-bottom: 3px solid white;

        }

        /* 2. THE MAIN LAYOUT WRAPPER */

        .main-content-wrapper {
            display: flex;
            align-items: stretch; /* Makes sidebar and pitch same height */
            justify-content: center;
            gap: 20px;
            padding: 20px;
            width: 100vw;
            /* 100vh (screen height) minus approx 160px for the two navbars */
            height: calc(100vh - 165px); 
            margin: 0;
            overflow: hidden; /* Prevents the wrapper itself from scrolling */
        }

        /* 3. THE INFO SIDEBAR (Left Column) */
        .info-sidebar {
            flex: 0 0 350px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            border-top: 10px solid #1b5e20;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            height: 100%; /* Fill the wrapper */
            overflow-y: auto; /* If text is too long, ONLY the sidebar scrolls */
            text-align: left;
        }

        .info-sidebar h2 { color: #1b5e20; font-weight: 800; }
        .info-sidebar hr { border-top: 2px solid #eee; margin: 20px 0; }
        .info-sidebar p { line-height: 1.6; font-size: 1.1rem; color: #444; }

        /* 4. THE PITCH (Right Column) */
        .pitch-container {
            flex: 1; /* Grows to fill available space */
            position: relative;
            max-width: 1200px; 
            height: 100%;     
            background-color: #2e7d32;
            border: 6px solid white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            /* Pitch Markings */
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.3) 2px, transparent 2px),
                radial-gradient(circle at center, transparent 20%, rgba(255,255,255,0.3) 21%, transparent 22%);
            background-size: 50% 100%, 100% 100%;
        }

        /* 5. PLAYER STYLING */
        .player {
            position: absolute;
            width: 65px; 
            height: 70px;
            background: white;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            clip-path: polygon(0% 20%, 20% 0%, 80% 0%, 100% 20%, 100% 100%, 0% 100%);
            transition: all 0.2s ease-in-out;
            z-index: 10;
        }

        .player:hover {
            transform: scale(1.15);
            background: #e8f5e9;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        /* The highlight effect */
        .player.highlight-active {
            background: #ffd700; /* Gold color */
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            z-index: 20;
        }
    </style>
</head>

<body data-json-url="{{ url_for('static', filename='data/formations.json') }}">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">IN FORMATION</a>
    <div class="ms-auto">
        <a class="nav-link d-inline text-white me-3" href="/">HOME</a>
        <a class="nav-link d-inline text-white me-3" href="/formations/433">FORMATIONS</a>
        <a class="nav-link d-inline text-white" href="/quiz">QUIZ</a>
    </div>
</nav>

<div class="formation-bar">
    <a class="formation-link" href="/formations/433">4-3-3</a>
    <a class="formation-link" href="/formations/442">4-4-2</a>
    <a class="formation-link" href="/formations/4231">4-2-3-1</a>
    <a class="formation-link" href="/formations/41212">4-1-2-1-2</a>
    <a class="formation-link" href="/formations/532">5-3-2</a>
</div>

<div class="main-content-wrapper">
    
    <div class="info-sidebar" id="info-box">
        <h2 id="display-title">Loading...</h2>
        <hr>
        <p id="display-text">Click a player icon or the field to see tactical details.</p>
    </div>

    <div class="pitch-container" id="pitch">
        <div id="player-layer"></div>
    </div>

</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
