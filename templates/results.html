<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IN FORMATION</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- 🔝 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">IN FORMATION</a>

    <div class="ms-auto">
        <a class="nav-link d-inline text-white" href="/">HOME</a>
        <a class="nav-link d-inline text-white" href="/formations/433">FORMATIONS</a>
        <a class="nav-link d-inline text-white" href="/quiz">QUIZ</a>
    </div>
    </nav>

    <div class="container text-center mt-5">
        <h1>Your Results</h1>
        <h2>{{score}} / {{total}}</h2>
        
        <button class="btn btn-primary m-2 review-btn">Back to Review</button>
        <button class="btn btn-primary m-2 retake-btn">Retake Quiz</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        $(document).on("click", ".review-btn", function () {
        fetch("/review", { method: "POST" })
            .then(() => {
                window.location.href = "/formations/433";
            });
        });

        $(document).on("click", ".retake-btn", function () {
        fetch("/start", { method: "POST" })
            .then(() => {
                window.location.href = "/quiz/1";
            });
        });
    </script>
</body>
</html>
