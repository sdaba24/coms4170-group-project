<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Formation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { 
            background-color: #f0f2f5; 
            margin: 0;
            overflow-x: hidden; /* Prevents side-scrolling */
        }

        /* 1. NAVBARS */
        .questions-bar {
            background-color: rgb(56, 164, 227);
            padding: 20px; 
            font-size: 1.3rem; 
            
            /* The Magic Sauce */
            display: flex;            /* Turns the bar into a flex container */
            justify-content: space-evenly; /* Spaces links evenly across the width */
            align-items: center;      /* Centers them vertically */
        }


    </style>
</head>

<body data-json-url="{{ url_for('static', filename='data/quiz.json') }}">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">IN FORMATION</a>
    <div class="ms-auto">
        <a class="nav-link d-inline text-white me-3" href="/">HOME</a>
        <a class="nav-link d-inline text-white me-3" href="/formations/433">FORMATIONS</a>
        <a class="nav-link d-inline text-white" href="/quiz">QUIZ</a>
    </div>
</nav>

<!-- <div class="questions-bar">
    <a class="formation-link" href="/quiz/1">Question 1</a>
    <a class="formation-link" href="/quiz/2">Question 2</a>
    <a class="formation-link" href="/quiz/3">Question 3</a>
    <a class="formation-link" href="/quiz/4">Question 4</a>
    <a class="formation-link" href="/quiz/5">Question 5</a>
</div> -->

<div class="container text-center mt-5">
    <h2>{{question.title}}</h2>
    <p class="lead">{{question.question}}</p>

    <div id="options">
        {% for key, value in question.options.items() %}
        <button class="btn btn-primary m-2 option-btn" data-value="{{key}}">
            {{ value }}
        </button>
        {% endfor %}
    </div>

    <div id="feedback" class="mt-4"></div>

</div>

<!-- jQuery (needed for your JS) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- JS for start button -->
 
<script>

    $(document).on("click", ".option-btn", function () {
        let selected = $(this).data("value");

        fetch("/submit_answer", { 
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                question_id: "{{ question_id }}",
                answer: selected
            })
         })
         .then(res => res.json())
         .then(data => {
            let feedback = "";
            if (data.correct){
                feedback = `<div class="alert alert-success">
                    Correct! <br>${data.explanation}<br>
                </div>
                <button class="btn btn-primary m-2 review-btn">Back to Review</button>
                <button class="btn btn-primary m-2 next-btn">Next</button>`;
            }
            else {  // need to implement "back to review" routing to specific topic page
                feedback = `<div class="alert alert-danger">
                    Incorrect <br>${data.explanation}<br>
                </div>
                <button class="btn btn-primary m-2 review-btn">Back to Review</button>
                <button class="btn btn-primary m-2 next-btn">Next</button>`;
            }
            $("#feedback").html(feedback);
         });
    });
    
    $(document).on("click", ".next-btn", function () {
        {% if last %}
            window.location.href = "/results";
        {% else %}
            window.location.href = "/quiz/{{ question_id + 1}}";
        {% endif %}
    });

    $(document).on("click", ".review-btn", function () {
        fetch("/review", { method: "POST" })
            .then(() => {
                window.location.href = "/formations/433";
            });
    });
</script>

</body>
</html>
