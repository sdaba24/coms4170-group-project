<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Formation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                            url('https://media.istockphoto.com/id/1637717332/photo/football-on-grass.jpg?s=612x612&w=0&k=20&c=yZzge-mFrHrABBhG7ECDzuOoiBo9esD_yBk3yAqigX8=');
            background-size: cover;
            background-position: bottom right;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .quiz-box {
            background: white;
            color: #333;
            border: 2px solid #1b5e20;
            border-radius: 12px;
            padding: 40px;
            max-width: 700px;
            margin: 5vh auto 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .quiz-box h2 {
            color: #1b5e20;
            font-weight: 800;
        }

        .quiz-box .lead {
            color: #444;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            margin: 8px 0 !important;
            padding: 12px 20px;
            border-radius: 8px;
            background-color: #28855d;
            border-color: #28855d;
        }

        .option-btn:hover {
            background-color: #6fac8e;
            border-color: #6fac8e;
        }

        .option-btn:disabled, .option-btn.disabled {
            background-color: #28855d;
            border-color: #28855d;
            opacity: 0.65;
        }

        .option-btn.correct {
            background-color: #6fac8e;
            border: 3px solid #00e676;
            opacity: .8;
        }

        .option-btn.wrong {
            background-color: #6fac8e;
            border: 3px solid #791715;
            opacity: .8;
        }

    </style>
</head>

<body data-json-url="{{ url_for('static', filename='data/quiz.json') }}">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">IN FORMATION</a>
    <div class="ms-auto">
        <a class="nav-link d-inline text-white me-3" href="/">HOME</a>
        <a class="nav-link d-inline text-white me-3" href="/formations/433">FORMATIONS</a>
        <a class="nav-link d-inline text-white" href="/quiz">QUIZ</a>
    </div>
</nav>

<!-- <div class="questions-bar">
    <a class="formation-link" href="/quiz/1">Question 1</a>
    <a class="formation-link" href="/quiz/2">Question 2</a>
    <a class="formation-link" href="/quiz/3">Question 3</a>
    <a class="formation-link" href="/quiz/4">Question 4</a>
    <a class="formation-link" href="/quiz/5">Question 5</a>
</div> -->

<div class="container text-center mt-5">
    <div class="quiz-box">
        <h2>{{question.title}}</h2>
        <p class="lead">{{question.question}}</p>

        <div id="options" style="max-width: 500px; margin: 0 auto;">
            {% for key, value in question.options.items() %}
            <button class="btn btn-primary option-btn {% if already_answered %}disabled{% endif %}"
                    data-value="{{key}}"
                    {% if already_answered %}disabled{% endif %}>
                <strong>{{ key | upper }}.</strong> {{ value }}
            </button>
            {% endfor %}
        </div>

        <div id="feedback" class="mt-4">
        {% if already_answered %}
            <div class="alert {% if saved_answer.correct %}alert-success{% else %}alert-danger{% endif %}">
                {% if saved_answer.correct %}Correct!{% else %}Incorrect{% endif %}
                <br>{{ question.explanation }}
            </div>
            <button class="btn btn-secondary m-2 review-btn" data-url="/formations/{{ review_formation }}">Back to Review</button>
            <button class="btn btn-primary m-2 next-btn">Next</button>
        {% endif %}
        </div>
    </div>
</div>

<!-- jQuery (needed for your JS) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- JS for start button -->
 
<script>

    $(document).on("click", ".option-btn", function () {
        if ($(this).prop("disabled")) return;

        let $clicked = $(this);  // save reference to clicked button
        $(".option-btn").prop("disabled", true).addClass("disabled");

        let selected = $clicked.data("value");

        fetch("/submit_answer", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                question_id: "{{ question_id }}",
                answer: selected
            })
        })
        .then(res => res.json())
        .then(data => {
            // Add green or red border to the clicked button
            if (data.correct) {
                $clicked.addClass("correct");
            } else {
                $clicked.addClass("wrong");
            }

            let reviewUrl = data.review_url;
            let feedbackHtml = "";
            if (data.correct) {
                feedbackHtml = `<div class="alert alert-success">Correct!<br>${data.explanation}</div>`;
            } else {
                feedbackHtml = `<div class="alert alert-danger">Incorrect<br>${data.explanation}</div>`;
            }
            feedbackHtml += `
                <button class="btn btn-secondary m-2 review-btn" data-url="${reviewUrl}">Back to Review</button>
                <button class="btn btn-primary m-2 next-btn">Next</button>`;
            $("#feedback").html(feedbackHtml);
        });
    });

    $(document).on("click", ".next-btn", function () {
        {% if last %}
            window.location.href = "/results";
        {% else %}
            window.location.href = "/quiz/{{ question_id + 1 }}";
        {% endif %}
    });

    $(document).on("click", ".review-btn", function () {
        let url = $(this).data("url");
        window.location.href = url;
    });
</script>

</body>
</html>
