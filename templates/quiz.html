<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Formation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { 
            background-color: #f0f2f5; 
            margin: 0;
            overflow-x: hidden; /* Prevents side-scrolling */
        }

        /* 1. NAVBARS */
        .formation-bar {
            background-color: #1b5e20;
            padding: 20px; 
            font-size: 1.3rem; 
            
            /* The Magic Sauce */
            display: flex;            /* Turns the bar into a flex container */
            justify-content: space-evenly; /* Spaces links evenly across the width */
            align-items: center;      /* Centers them vertically */
        }



    </style>
</head>

<body data-json-url="{{ url_for('static', filename='data/quiz.json') }}">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">IN FORMATION</a>
    <div class="ms-auto">
        <a class="nav-link d-inline text-white me-3" href="/">HOME</a>
        <a class="nav-link d-inline text-white me-3" href="/formations/433">FORMATIONS</a>
        <a class="nav-link d-inline text-white me-3" href="/quiz">QUIZ</a>
    </div>
</nav>

<div class="container mt-5">
    <h1>How well did you learn?</h1>
    <p class="lead">You will now take a short quiz to test your understanding of how formations in 
        soccer work and the tactics behind them.</p>
    <p class="lead">Learn soccer formations and test your knowledge</p>

     <button id="review" class="btn btn-primary btn-lg mt-3">
       Back to Review
    </button>

    <button id="startQuiz" class="btn btn-primary btn-lg mt-3">
       Take Quiz
    </button>
</div>

<!-- jQuery (needed for your JS) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- JS for start button -->
<script>
    $("#startQuiz").click(function () {
        fetch("/start", { method: "POST" })
            .then(() => {
                window.location.href = "/quiz/1";
            });
    });

    $("#review").click(function () {
        fetch("/review", { method: "POST" })
            .then(() => {
                window.location.href = "/formations/433";
            });
    });
</script>

</body>
</html>
