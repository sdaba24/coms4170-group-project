<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Formation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                            url('https://media.istockphoto.com/id/472347896/photo/striped-soccer-field.jpg?s=1024x1024&w=is&k=20&c=9CU5BTONIlj487oiIfamZ8cD9Y8yreb62Kn6XTrkUcI=');
            background-size: cover;
            background-position: bottom right;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
        }

        .quiz-box {
            background: white;
            color: #333;
            border: 2px solid #1b5e20;
            border-radius: 12px;
            padding: 40px;
            max-width: 650px;
            margin: 5vh auto 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .quiz-box h1 {
            color: #1b5e20;
            font-weight: 800;
        }

        .quiz-box .lead {
            color: #444;
        }

    </style>
</head>

<body data-json-url="{{ url_for('static', filename='data/quiz.json') }}">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">IN FORMATION</a>
    <div class="ms-auto">
        <a class="nav-link d-inline text-white me-3" href="/">HOME</a>
        <a class="nav-link d-inline text-white me-3" href="/formations/433">FORMATIONS</a>
        <a class="nav-link d-inline text-white me-3" href="/quiz">QUIZ</a>
    </div>
</nav>

<div class="container text-center mt-5">
    <div class="quiz-box">
        <h1>How well did you learn?</h1>
        <p class="lead">Take a short quiz to test your understanding of soccer formations and the tactics behind them.</p>

        <button id="review" class="btn btn-secondary btn-lg mt-3">Back to Review</button>
        <button id="startQuiz" class="btn btn-primary btn-lg mt-3">Take Quiz</button>
    </div>
</div>

<!-- jQuery (needed for your JS) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- JS for start button -->
<script>
    $("#startQuiz").click(function () {
        window.location.href = "/quiz/1";
    }); 

    $("#review").click(function () {
        fetch("/review", { method: "POST" })
            .then(() => {
                window.location.href = "/formations/433";
            });
    });
</script>

</body>
</html>
